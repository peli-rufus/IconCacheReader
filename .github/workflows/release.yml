name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'      # triggers on v1.0.0, v2.1.3, etc.
  workflow_dispatch:  # allow manual trigger from Actions tab

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  # -------------------------------------------------------------------------
  # Build the Windows EXE on a Windows runner using PyInstaller
  # -------------------------------------------------------------------------
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        run: pyinstaller IconCacheReader.spec

      - name: Verify build output
        run: |
          if (!(Test-Path "dist\IconCacheReader.exe")) {
            Write-Error "EXE not found in dist\"
            exit 1
          }
          $size = (Get-Item "dist\IconCacheReader.exe").Length / 1MB
          Write-Host "EXE size: $([math]::Round($size, 1)) MB"
          .\dist\IconCacheReader.exe --help

      - name: Upload EXE as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: IconCacheReader-windows-x64
          path: dist\IconCacheReader.exe
          retention-days: 30

  # -------------------------------------------------------------------------
  # Run the test suite (cross-platform — Linux runner is faster/cheaper)
  # -------------------------------------------------------------------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run test suite
        run: python tests/test_IconCacheReader.py -v

  # -------------------------------------------------------------------------
  # Create a GitHub Release and attach the EXE (only on version tags)
  # -------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: [build-windows, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows EXE artifact
        uses: actions/download-artifact@v4
        with:
          name: IconCacheReader-windows-x64
          path: dist/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate SHA256 checksum
        run: |
          sha256sum dist/IconCacheReader.exe > dist/IconCacheReader.exe.sha256
          cat dist/IconCacheReader.exe.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "IconCacheReader ${{ steps.version.outputs.VERSION }}"
          body: |
            ## IconCacheReader ${{ steps.version.outputs.VERSION }}

            Windows standalone executable — no Python installation required.

            ### Download
            | File | Description |
            |------|-------------|
            | `IconCacheReader.exe` | Windows x64 standalone binary |
            | `IconCacheReader.exe.sha256` | SHA256 checksum |

            ### Verify integrity (PowerShell)
            ```powershell
            Get-FileHash .\IconCacheReader.exe -Algorithm SHA256
            # Compare with the .sha256 file
            ```

            ### Quick start
            ```cmd
            IconCacheReader.exe -users-dir "E:\Image\C\Users" -csv results.csv
            ```

            See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for full usage.
          files: |
            dist/IconCacheReader.exe
            dist/IconCacheReader.exe.sha256
          draft: false
          prerelease: false
